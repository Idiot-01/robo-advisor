name: Update mNAV Data
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Upgraded to v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: '3.11' # Modern version to fix EOL warnings

      - name: Install dependencies
        run: pip install requests yfinance google-genai google-api-core

      - name: Run update script
        env:
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git pull origin main
          python update_mnav.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data.json advice.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update" && git push)