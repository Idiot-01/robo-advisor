<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTR mNAV Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { width: 100%; max-width: 850px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .ai-box { background: #eef6ff; border-left: 5px solid #007bff; padding: 15px; margin-bottom: 25px; border-radius: 4px; font-size: 0.95rem; line-height: 1.5; color: #333; }
        .ai-header { font-weight: bold; color: #007bff; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .controls { margin-bottom: 20px; display: flex; gap: 8px; justify-content: center; }
        button { padding: 8px 14px; cursor: pointer; border: 1px solid #dee2e6; background: white; border-radius: 6px; font-size: 0.85rem; font-weight: 500; }
        button.active { background: #007bff; color: white; border-color: #007bff; }
        canvas { margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>MSTR mNAV Tracker</h2>
        
        <div class="ai-box">
            <div class="ai-header">✨ Gemini Analyst Insight</div>
            <div id="ai-content">Analyzing latest trends...</div>
        </div>

        <div class="controls">
            <button onclick="updateRange('1wk', this)">1W</button>
            <button onclick="updateRange('1m', this)">1M</button>
            <button onclick="updateRange('3m', this)">3M</button>
            <button onclick="updateRange('6m', this)">6M</button>
            <button class="active" onclick="updateRange('1y', this)">1Y</button>
        </div>

        <canvas id="mnavChart"></canvas>
    </div>

    <script>
        let fullData = [];
        let myChart;

        async function init() {
            // Load History
            const dataRes = await fetch('data.json');
            fullData = await dataRes.json();

            // Load AI Advice
            try {
                const adviceRes = await fetch('advice.txt');
                document.getElementById('ai-content').innerText = await adviceRes.text();
            } catch (e) { document.getElementById('ai-content').innerText = "Insight temporarily unavailable."; }
            
            const ctx = document.getElementById('mnavChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { datasets: [{ label: 'mNAV Ratio', data: [], borderColor: '#007bff', backgroundColor: 'rgba(0,123,255,0.1)', fill: true, tension: 0.3 }] },
                options: {
                    scales: {
                        x: { type: 'time', time: { unit: 'month' } },
                        y: { min: null, max: null, grace: '10%' }
                    }
                }
            });
            updateRange('1y', document.querySelector('button.active'));
        }

        function updateRange(range, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const start = luxon.DateTime.now().minus({
                weeks: range === '1wk' ? 1 : 0,
                months: range === '1m' ? 1 : range === '3m' ? 3 : range === '6m' ? 6 : 0,
                years: range === '1y' ? 1 : 0
            });

            const filtered = fullData.filter(d => luxon.DateTime.fromISO(d.date) >= start);
            myChart.data.datasets[0].data = filtered.map(d => ({ x: d.date, y: d.mnav }));
            myChart.update();
        }

        init();
    </script>
</body>
</html>
